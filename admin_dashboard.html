<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard - TCET Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body{font-family:'Segoe UI',sans-serif;background:#f5f6fa;transition:0.3s;}
.dark{background:#121212;color:#f5f6fa;}
.navbar{background:linear-gradient(90deg,#1e3c72,#2a5298);}
.sidebar{height:100vh;background:#1e3c72;color:white;position:fixed;width:220px;top:0;left:0;padding-top:100px;transition:all 0.3s;}
.sidebar a{display:block;color:white;padding:15px 20px;text-decoration:none;font-weight:600;transition:0.2s;}
.sidebar a:hover{background:#2a5298;border-radius:8px;}
.main-content{margin-left:220px;padding:80px 20px 20px 20px;}
.card{border-radius:15px;padding:25px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.1);transition:0.3s;}
.card:hover{transform:translateY(-8px);box-shadow:0 15px 30px rgba(0,0,0,0.2);}
.stats-icon{font-size:50px;margin-bottom:15px;color:#1e3c72;}
.dark .card{background:#1e1e1e;color:white;}
.footer{padding:15px;text-align:center;font-size:14px;color:gray;margin-top:50px;}
@media(max-width:768px){.sidebar{width:100%;height:auto;position:relative;padding-top:20px;}.main-content{margin-left:0;padding-top:20px;}}
</style>
</head>
<body id="body">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow fixed-top">
<div class="container-fluid">
<a class="navbar-brand fw-bold">TCET Admin Portal</a>
<button class="btn btn-warning ms-auto" onclick="darkMode()"><i class="bi bi-moon"></i></button>
<a href="login.html" class="btn btn-danger ms-2">Logout</a>
</div>
</nav>

<!-- Sidebar -->
<div class="sidebar">
<a href="#">Dashboard</a>
<a href="subject.html">Subjects</a>
<a href="students.html">Students</a>
<a href="#">Assignments</a>
<a href="#">Reports</a>
</div>

<!-- Main Content -->
<div class="main-content">
<h1 class="mb-4">Admin Dashboard</h1>
<p class="text-muted mb-5">Manage students, subjects, assignments, and view reports.</p>

<div class="row g-4">
<div class="col-md-4">
<div class="card">
<i class="bi bi-people stats-icon"></i>
<h5>Total Students</h5>
<h2 id="totalStudents">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card">
<i class="bi bi-book stats-icon"></i>
<h5>Total Subjects</h5>
<h2 id="totalSubjects">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card">
<i class="bi bi-file-earmark-text stats-icon"></i>
<h5>Total Assignments</h5>
<h2 id="totalAssignments">0</h2>
</div>
</div>
</div>
</div>

<div class="footer">© 2026 TCET Admin Portal</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Dark mode toggle
function darkMode(){document.getElementById("body").classList.toggle("dark");}

// Update dashboard counts safely and notify admin
function updateStats(){
    // Only counts, no private info
    let students = JSON.parse(localStorage.getItem("students")) || [];
    let subjects = JSON.parse(localStorage.getItem("subjects")) || [];
    let assignments = JSON.parse(localStorage.getItem("assignments")) || [];

    document.getElementById("totalStudents").innerText = students.length;
    document.getElementById("totalSubjects").innerText = subjects.length;
    document.getElementById("totalAssignments").innerText = assignments.length;

    // Notify admin if a new student registered
    if(localStorage.getItem("newStudentRegistered") === "true"){
        alert("📢 A new student has registered!");
        localStorage.removeItem("newStudentRegistered"); // reset flag
    }
}

// Run on page load
updateStats();
</script>
</body>
</html>
