<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TCET Subscription</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

body{
font-family:Segoe UI;
background:#f4f6f9;
}

.navbar{
background:linear-gradient(90deg,#1e3c72,#2a5298);
}

.card{
border:none;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.icon{
font-size:50px;
margin-bottom:15px;
}

.btn-professional{
border-radius:50px;
font-weight:600;
}

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:998;
}

.qr-box{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
z-index:999;
width:320px;
}

.qr-box img{
width:230px;
margin-top:10px;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
}

.success-box{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
z-index:999;
}

.success-icon{
font-size:60px;
color:green;
}

.footer{
margin-top:70px;
text-align:center;
color:gray;
}

</style>
</head>

<body>

<nav class="navbar navbar-dark shadow">
<div class="container d-flex justify-content-between">

<button class="btn btn-light" onclick="history.back()">
<i class="bi bi-arrow-left"></i> Back
</button>

<span class="navbar-brand fw-bold m-0">
TCET Student Portal
</span>

<a href="index.html" class="btn btn-light">
<i class="bi bi-house"></i> Home
</a>

</div>
</nav>

<div class="container text-center mt-5">

<h1 class="text-primary">Choose Subscription</h1>
<p class="text-muted">Unlock premium notes</p>

</div>

<div class="container mt-4">

<div class="row justify-content-center g-4">

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<div class="icon text-primary">
<i class="bi bi-calendar-week-fill"></i>
</div>

<h4>Monthly Plan</h4>
<p>₹299</p>

<button class="btn btn-primary w-100 btn-professional"
onclick="showQR('Monthly',299)">
Subscribe
</button>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<div class="icon text-success">
<i class="bi bi-calendar-check-fill"></i>
</div>

<h4>Yearly Plan</h4>
<p>₹2999</p>

<button class="btn btn-success w-100 btn-professional"
onclick="showQR('Yearly',2999)">
Subscribe
</button>

</div>

</div>

</div>

</div>

<div class="overlay" id="overlay"></div>

<div class="qr-box" id="qrBox">

<span class="close" onclick="closeQR()">✖</span>

<h4 id="planText"></h4>

<img id="qrImage">

<p class="mt-2">Scan using PhonePe / GPay / Paytm</p>

<button class="btn btn-dark w-100 mt-2" onclick="payNow()">
<i class="bi bi-credit-card"></i> Pay Now
</button>

<button class="btn btn-secondary w-100 mt-2" onclick="closeQR()">
<i class="bi bi-arrow-left"></i> Back
</button>

<button class="btn btn-success w-100 mt-2" onclick="paymentSuccess()">
✔ I Have Paid
</button>

</div>

<div class="success-box" id="successBox">

<div class="success-icon">
<i class="bi bi-check-circle-fill"></i>
</div>

<h3 class="mt-3 text-success">Payment Successful</h3>

<p>Your subscription is now active.</p>

<a href="index.html" class="btn btn-primary mt-3">
Go to Home
</a>

</div>

<div class="footer">
© 2026 TCET Student Portal
</div>

<script>

let paymentLink="";
let paid=false;

function showQR(plan,amount){

paid=false;

document.getElementById("planText").innerText =
plan+" Plan - Pay ₹"+amount;

document.getElementById("overlay").style.display="block";
document.getElementById("qrBox").style.display="block";

/* QR CHANGE */

if(amount==299){
document.getElementById("qrImage").src="qr299.png";
}

if(amount==2999){
document.getElementById("qrImage").src="qr2999.png";
}

paymentLink="upi://pay?pa=8108801791@ibl&pn=RITIK%20RAMMANOHAR%20GUPTA&am="+amount+"&cu=INR";

}

function payNow(){

paid=true;

window.location.href = paymentLink;

}

function paymentSuccess(){

if(!paid){

alert("⚠ Please complete payment first");

return;

}

document.getElementById("overlay").style.display="none";
document.getElementById("qrBox").style.display="none";
document.getElementById("successBox").style.display="block";

}

function closeQR(){

document.getElementById("overlay").style.display="none";
document.getElementById("qrBox").style.display="none";

}

</script>

</body>
</html>
