<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Registration - TCET Portal</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
/* Body and background */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* Card container */
.card {
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 450px;
    width: 100%;
    background: white;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 25px 45px rgba(0,0,0,0.25);
}

/* Title */
.card h3 {
    font-weight: 700;
    color: #1e3c72;
    text-align: center;
    margin-bottom: 30px;
}

/* Form controls */
.form-control {
    border-radius: 50px;
    padding: 12px 20px;
    margin-bottom: 20px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.form-control:focus {
    border-color: #1e3c72;
    box-shadow: 0 0 8px rgba(30,60,114,0.3);
}

/* Buttons */
.btn-success {
    border-radius: 50px;
    padding: 12px;
    font-weight: 600;
    width: 100%;
    transition: 0.3s;
}

.btn-success:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* Links */
.text-center a {
    color: #1e3c72;
    font-weight: 600;
    text-decoration: none;
}

.text-center a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 480px) {
    .card {
        padding: 30px 20px;
    }
}
</style>
</head>
<body>

<div class="card">
    <h3>Student Registration</h3>

    <div class="input-group mb-3">
        <span class="input-group-text bg-white border-0"><i class="bi bi-person-fill"></i></span>
        <input type="text" id="regName" class="form-control" placeholder="Full Name">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text bg-white border-0"><i class="bi bi-envelope-fill"></i></span>
        <input type="email" id="regEmail" class="form-control" placeholder="Email">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text bg-white border-0"><i class="bi bi-lock-fill"></i></span>
        <input type="password" id="regPassword" class="form-control" placeholder="Password">
    </div>

    <button class="btn btn-success mb-3" onclick="registerStudent()">Register</button>

    <p class="text-center">Already have an account? <a href="login.html">Login here</a></p>
</div>

<script>
// Registration function
function registerStudent() {
    const name = document.getElementById("regName").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value.trim();

    if(!name || !email || !password){
        alert("Please fill all fields!");
        return;
    }

    let students = JSON.parse(localStorage.getItem("students")) || [];

    if(students.some(s => s.email === email)){
        alert("Email already registered!");
        return;
    }

    students.push({name, email, password});
    localStorage.setItem("students", JSON.stringify(students));
    localStorage.setItem("newStudentRegistered", "true");

    alert("Registration successful! Please login.");
    window.location.href = "login.html";
}
</script>

</body>
</html>
